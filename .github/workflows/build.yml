name: ci

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - uses: coursier/cache-action@v6
    - uses: actions/setup-java@v3
      with:
        java-version: "11"
        architecture: "x64"
        distribution: "temurin"
    - name: Check formatting
      run:
        ./mill --no-server --disable-ticker mill.scalalib.scalafmt.ScalafmtModule/checkFormatAll __.sources
    - name: Check scalafix
      run:
        ./mill --no-server --disable-ticker __.fix --check
    - name: Compile
      run:
        ./mill --no-server --disable-ticker __.compile
    - name: Publish Artifacts
      run:
        ./mill --no-server --disable-ticker __.publishArtifacts
    - name: Test
      run:
        ./mill --no-server --disable-ticker __.testForked
  publish-sonatype:
    if: github.repository == 'lolgab/mill-mima' && (contains(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
    needs: build
    runs-on: ubuntu-24.04
    env:
      MILL_PGP_SECRET_BASE64: ${{ secrets.SONATYPE_PGP_PRIVATE_KEY }}
      MILL_PGP_PASSPHRASE: ${{ secrets.SONATYPE_PGP_PRIVATE_KEY_PASSWORD }}
      MILL_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USER }}
      MILL_SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      LANG: "en_US.UTF-8"
      LC_MESSAGES: "en_US.UTF-8"
      LC_ALL: "en_US.UTF-8"
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: coursier/cache-action@v6
      - uses: actions/setup-java@v3
        with:
          java-version: "11"
          architecture: "x64"
          distribution: "temurin"
      - name: Publish to Maven Central
        run: ./mill mill.javalib.SonatypeCentralPublishModule/
